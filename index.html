<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <style>
    .content-section {
      margin-bottom: 100vh;
    }

    #cube {
      margin-top: 20vh;
      text-align: center;
    }

    @media (max-width: 991.98px) {
      .offcanvas-collapse {
        position: fixed;
        top: 56px;
        /* Height of navbar */
        bottom: 0;
        left: 100%;
        width: 100%;
        padding-right: 1rem;
        padding-left: 1rem;
        overflow-y: auto;
        visibility: hidden;
        background-color: #343a40;
      }

      .offcanvas-collapse.open {
        visibility: visible;
        animation-name: fadeInOpacity;
        animation-iteration-count: 1;
        animation-timing-function: ease-in;
        animation-duration: 0.5s;
        opacity: 0.9;
        transform: translateX(-100%);
      }
    }


    @keyframes fadeInOpacity {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 0.9;
      }
    }


    /* Typewritter effect */

    /* .typewritter{
	font-family: monospace;
	display: inline-block
} */
    .hello_heading {
      opacity: 0;
      visibility: hidden;
    }

    .type {
      opacity: 1;
      visibility: visible;
      display: inline-block;
      overflow: hidden;
      letter-spacing: 3px;
      animation: typing 5s steps(45, end);
      white-space: nowrap;
      font-size: 32px;
      box-sizing: border-box;
    }

    @keyframes typing {
      from {
        width: 0%
      }

      to {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark" aria-label="Main navigation">
    <div class="container-fluid">
      <a class="navbar-brand" href="#cube">Void</a>
      <button class="navbar-toggler p-0 border-0" type="button" id="navbarSideCollapse" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="navbar-collapse offcanvas-collapse" id="navbarsExampleDefault">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Github</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#about">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#projects">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#skills">Skills</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#contacts">Contacts</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main role="main">
    <section id="cube" class="content-section">
      <div id="hello_container">
        <div class="heading_container">
          <h1 class="hello_heading" id="hello1">Hello!</h1>
        </div>
        <div class="heading_container">
          <h2 class="hello_heading" id="hello2">I'm void and welcome to my website!</h2>
        </div>
      </div>
    </section>
    <section id="about" class="content-section">
      <h1 class="greetings">Hello!</h1>
    </section>
    <section id="projects" class="content-section">
      <h1 class="greetings">Hello!</h1>
    </section>
    <section id="skills" class="content-section">
      <h1 class="greetings">Hello!</h1>
    </section>
    <section id="contacts" class="content-section">
      <h1 class="greetings">Hello!</h1>
    </section>
  </main>
  <script>
    // Modified from bootstrap example
    document.querySelector('#navbarSideCollapse').addEventListener('click', () => {
      document.querySelector('.offcanvas-collapse').classList.toggle('open');
    })

    // Typewritter effect delay
    setTimeout(() => {
      document.querySelector('#hello1').classList.toggle('type');
    }
      , 400)

    setTimeout(() => {
      document.querySelector('#hello2').classList.toggle('type');
    }
      , 1700)
  </script>
</body>

</html>
